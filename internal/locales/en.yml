# Commands help
help_owner: |
  👑 <b>ᴏᴡɴᴇʀ ᴄᴏᴍᴍᴀɴᴅs</b>

  <i>ᴇxᴄʟᴜsɪᴠᴇ ᴛᴏᴏʟs ꜰᴏʀ ᴍᴀɴᴀɢɪɴɢ sᴜᴅᴏᴇʀs, ᴇxᴇᴄᴜᴛɪɴɢ sʏsᴛᴇᴍ ᴄᴏᴅᴇ, ᴀɴᴅ ᴘᴇʀꜰᴏʀᴍɪɴɢ ʙᴏᴛ ᴀᴅᴍɪɴɪsᴛʀᴀᴛɪᴏɴ sᴇᴄᴜʀᴇʟʏ.</i>

  <b>ᴄᴏᴍᴍᴀɴᴅs:</b>
  <blockquote>
  <b>/ᴀᴅᴅsᴜᴅᴏ</b> - ᴀᴅᴅ ᴀ ɴᴇᴡ ᴜsᴇʀ ᴛᴏ ʙᴏᴛ's sᴜᴅᴏʟɪsᴛ
  <b>/ᴅᴇʟsᴜᴅᴏ</b> - ʀᴇᴍᴏᴠᴇ ᴀ ᴜsᴇʀ ꜰʀᴏᴍ ʙᴏᴛ's sᴜᴅᴏʟɪsᴛ
  <b>/ᴇᴠᴀʟ</b> - ᴇxᴇᴄᴜᴛᴇ ɢᴏ ᴄᴏᴅᴇ sɴɪᴘᴘᴇᴛs
  <b>/ᴍᴀɪɴᴛᴇɴᴀɴᴄᴇ</b> — ᴍᴀɴᴀɢᴇ ᴛʜᴇ ʙᴏᴛ’s ᴍᴀɪɴᴛᴇɴᴀɴᴄᴇ ᴍᴏᴅᴇ
  <b>/ʀᴇsᴛᴀʀᴛ</b> — ʀᴇsᴛᴀʀᴛ ᴛʜᴇ ʙᴏᴛ
  <b>/sʜ</b> - ʀᴜɴ sʜᴇʟʟ ᴄᴏᴍᴍᴀɴᴅs
  </blockquote>

help_sudo: |
  ⚡ <b>sᴜᴅᴏᴇʀ ᴄᴏᴍᴍᴀɴᴅs</b>

  <i>ᴀᴅᴠᴀɴᴄᴇᴅ ᴛᴏᴏʟs ꜰᴏʀ ᴍᴀɴᴀɢɪɴɢ ʙᴏᴛ ʙᴇʜᴀᴠɪᴏʀ, ᴍᴏɴɪᴛᴏʀɪɴɢ ᴘᴇʀꜰᴏʀᴍᴀɴᴄᴇ, ᴀɴᴅ ᴄᴏɴᴛʀᴏʟʟɪɴɢ ʟᴏɢɢɪɴɢ ᴀɴᴅ ᴀᴜᴛᴏᴍᴀᴛɪᴏɴ.</i>

  <b>ᴄᴏᴍᴍᴀɴᴅs:</b>
  <blockquote>
  <b>/ᴀᴄᴛɪᴠᴇ</b> - sʜᴏᴡs ᴛᴏᴛᴀʟ ᴀᴄᴛɪᴠᴇ ᴄʜᴀᴛs
  <b>/ᴀᴜᴛᴏʟᴇᴀᴠᴇ</b> - ᴛᴏɢɢʟᴇ ᴀᴜᴛᴏᴍᴀᴛɪᴄ ᴄʜᴀᴛ ʟᴇᴀᴠɪɴɢ
  <b>/ʟᴏɢɢᴇʀ</b> - ᴇɴᴀʙʟᴇ ᴏʀ ᴅɪsᴀʙʟᴇ ʟᴏɢɢᴇʀ
  <b>/sᴛᴀᴛs</b> - ᴅɪsᴘʟᴀʏ ᴛʜᴇ ʙᴏᴛ & sʏsᴛᴇᴍ sᴛᴀᴛs
  <b>/ʟᴏɢs</b> - ɢᴇᴛ ᴛʜᴇ sʏsᴛᴇᴍ ʟᴏɢs 
  </blockquote>

help_admin: |
  🛠 <b>ᴀᴅᴍɪɴ ᴄᴏᴍᴍᴀɴᴅs</b>

  <i>ᴍᴜsɪᴄ ᴀɴᴅ ᴘʟᴀʏʙᴀᴄᴋ ᴄᴏɴᴛʀᴏʟ ᴛᴏᴏʟs ꜰᴏʀ ᴀᴅᴍɪɴs ᴛᴏ ʜᴀɴᴅʟᴇ ᴘʟᴀʏʙᴀᴄᴋ ᴇᴀsɪʟʏ.</i>

  <b>ᴄᴏᴍᴍᴀɴᴅs:</b>
  <blockquote>
  <b>/ᴘʟᴀʏᴍᴏᴅᴇ</b> - ᴄᴏɴᴛʀᴏʟ ᴡʜᴏ ᴄᴀɴ ᴜsᴇ /ᴘʟᴀʏ
  <b>/ᴄᴍᴅᴅᴇʟᴇᴛᴇ</b> - ᴛᴏɢɢʟᴇ ᴀᴜᴛᴏᴍᴀᴛɪᴄ ᴅᴇʟᴇᴛɪᴏɴ ᴏꜰ ʙᴏᴛ ᴄᴏᴍᴍᴀɴᴅs
  <b>/sᴘᴇᴇᴅ</b> - ᴄʜᴀɴɢᴇ ᴘʟᴀʏʙᴀᴄᴋ sᴘᴇᴇᴅ
  <b>/sᴋɪᴘ</b> - sᴋɪᴘ ᴛʜᴇ ᴄᴜʀʀᴇɴᴛ sᴏɴɢ
  <b>/ᴘᴀᴜsᴇ</b> - ᴘᴀᴜsᴇ ᴛʜᴇ ᴄᴜʀʀᴇɴᴛ ᴘʟᴀʏʙᴀᴄᴋ
  <b>/ʀᴇsᴜᴍᴇ</b> - ʀᴇsᴜᴍᴇ ᴘᴀᴜsᴇᴅ ᴘʟᴀʏʙᴀᴄᴋ
  <b>/ʀᴇᴘʟᴀʏ</b> - ʀᴇᴘʟᴀʏ ᴛʜᴇ ᴄᴜʀʀᴇɴᴛ sᴏɴɢ
  <b>/ᴍᴜᴛᴇ</b> - ᴍᴜᴛᴇ ᴘʟᴀʏʙᴀᴄᴋ
  <b>/ᴜɴᴍᴜᴛᴇ</b> - ᴜɴᴍᴜᴛᴇ ᴘʟᴀʏʙᴀᴄᴋ
  <b>/sᴇᴇᴋ</b> - sᴇᴇᴋ ꜰᴏʀᴡᴀʀᴅ ʙʏ ᴀ ꜰᴇᴡ sᴇᴄᴏɴᴅs
  <b>/sᴇᴇᴋʙᴀᴄᴋ</b> - sᴇᴇᴋ ʙᴀᴄᴋᴡᴀʀᴅ ʙʏ ᴀ ꜰᴇᴡ sᴇᴄᴏɴᴅs
  <b>/ᴊᴜᴍᴘ</b> - ᴊᴜᴍᴘ ᴛᴏ ᴀ ɢɪᴠᴇɴ ᴛɪᴍᴇ ɪɴ ᴛʀᴀᴄᴋ
  <b>/ᴍᴏᴠᴇ</b> - ᴍᴏᴠᴇ ᴀ ǫᴜᴇᴜᴇᴅ ᴛʀᴀᴄᴋ ᴛᴏ ᴀɴᴏᴛʜᴇʀ ᴘᴏsɪᴛɪᴏɴ
  <b>/ᴄʟᴇᴀʀ</b> - ᴄʟᴇᴀʀ ᴀʟʟ sᴏɴɢs ꜰʀᴏᴍ ǫᴜᴇᴜᴇ
  <b>/ʀᴇᴍᴏᴠᴇ</b> - ʀᴇᴍᴏᴠᴇ ᴀ sᴘᴇᴄɪꜰɪᴄ ᴛʀᴀᴄᴋ ꜰʀᴏᴍ ǫᴜᴇᴜᴇ
  <b>/sʜᴜꜰꜰʟᴇ</b> - sʜᴜꜰꜰʟᴇ ᴀʟʟ ǫᴜᴇᴜᴇᴅ ᴛʀᴀᴄᴋs
  <b>/ʟᴏᴏᴘ</b> - ᴇɴᴀʙʟᴇ ᴏʀ ᴅɪsᴀʙʟᴇ ʟᴏᴏᴘɪɴɢ
  <b>/sᴛᴏᴘ</b> - sᴛᴏᴘ ᴘʟᴀʏʙᴀᴄᴋ ᴀɴᴅ ʟᴇᴀᴠᴇ ᴠᴄ
  <b>/ɴᴏᴛʜᴜᴍʙ</b> - ᴇɴᴀʙʟᴇ ᴏʀ ᴅɪsᴀʙʟᴇ ᴀʀᴛᴡᴏʀᴋ/ᴛʜᴜᴍʙɴᴀɪʟ ɪɴ ᴘʟᴀʏʙᴀᴄᴋ ᴍᴇssᴀɢᴇs
  </blockquote>

help_public: |
  🌍 <b>ᴘᴜʙʟɪᴄ ᴄᴏᴍᴍᴀɴᴅs</b>

  <i>ꜰᴇᴀᴛᴜʀᴇs ꜰᴏʀ ᴘʟᴀʏɪɴɢ sᴏɴɢs, ᴠɪᴇᴡɪɴɢ ǫᴜᴇᴜᴇs, ᴄʜᴇᴄᴋɪɴɢ ʟᴀᴛᴇɴᴄʏ, ᴀɴᴅ ʀᴇᴘᴏʀᴛɪɴɢ ʙᴜɢs.</i>

  <b>ᴄᴏᴍᴍᴀɴᴅs:</b>
  <blockquote>
  <b>/ᴘʟᴀʏ</b> - ᴘʟᴀʏ ᴀ sᴏɴɢ
  <b>/ǫᴜᴇᴜᴇ</b> - ᴠɪᴇᴡ ᴀʟʟ ᴛʀᴀᴄᴋs ᴄᴜʀʀᴇɴᴛʟʏ ǫᴜᴇᴜᴇᴅ
  <b>/ᴘɪɴɢ</b> - ᴄʜᴇᴄᴋ ʙᴏᴛ’s ɴᴇᴛᴡᴏʀᴋ ʟᴀᴛᴇɴᴄʏ
  <b>/sᴛᴀʀᴛ</b> - sᴛᴀʀᴛ ᴛʜᴇ ʙᴏᴛ
  <b>/ʜᴇʟᴘ</b> - sʜᴏᴡ ʜᴇʟᴘ ᴍᴇɴᴜ
  <b>/ʙᴜɢ</b> - ʀᴇᴘᴏʀᴛ ᴀɴ ɪssᴜᴇ ᴏʀ ᴘʀᴏʙʟᴇᴍ
  <b>/ᴘᴏsɪᴛɪᴏɴ</b> - sʜᴏᴡ ᴄᴜʀʀᴇɴᴛ ᴛʀᴀᴄᴋ’s ᴛɪᴍᴇsᴛᴀᴍᴘ
  <b>/ʀᴇʟᴏᴀᴅ</b> - ʀᴇʟᴏᴀᴅ ᴀᴅᴍɪɴ ᴏʀ ᴄᴀᴄʜᴇ ᴅᴀᴛᴀ
  <b>/ᴊsᴏɴ</b> - sʜᴏᴡ ᴍᴇssᴀɢᴇ ᴊsᴏɴ sᴛʀᴜᴄᴛᴜʀᴇ
  <b>/sᴜᴅᴏʟɪsᴛ</b> - ᴠɪᴇᴡ sᴜᴅᴏ ᴜsᴇʀ ʟɪsᴛ
  </blockquote>
  
