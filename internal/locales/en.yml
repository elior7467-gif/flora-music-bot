# Assistant Restricted / Banned
assistant_restricted_warning: |
  <b>ᴀssɪsᴛᴀɴᴛ ʀᴇsᴛʀɪᴄᴛᴇᴅ</b>

  ᴛʜᴇ ᴀssɪsᴛᴀɴᴛ {assistant} (ɪᴅ: <code>{id}</code>) ʜᴀs ʙᴇᴇɴ <b>ʙᴀɴɴᴇᴅ</b> ᴏʀ ʀᴇsᴛʀɪᴄᴛᴇᴅ ɪɴ ᴛʜɪs ᴄʜᴀᴛ.
  ɪ ᴄᴀɴɴᴏᴛ ᴘʟᴀʏ ᴍᴜsɪᴄ, ᴍᴀɴᴀɢᴇ ᴛʜᴇ ǫᴜᴇᴜᴇ, ᴏʀ ᴄʟᴇᴀɴ ᴜᴘ ᴛʀᴀᴄᴋs ᴡʜɪʟᴇ ᴛʜɪs ᴄᴏɴᴛɪɴᴜᴇs.

  <i>ᴜɴʙᴀɴ ᴛʜᴇ ᴀssɪsᴛᴀɴᴛ ᴛᴏ ʀᴇsᴛᴏʀᴇ ᴀʟʟ ᴍᴜsɪᴄ ꜰᴇᴀᴛᴜʀᴇs </i>

# Common auth messages
auth_no_user: "ᴘʟᴇᴀsᴇ ᴘʀᴏᴠɪᴅᴇ ᴀ ᴜsᴇʀ — ᴜsᴇ:\n{cmd} [ᴜsᴇʀ_ɪᴅ] ᴏʀ ʀᴇᴘʟʏ ᴛᴏ ᴀ ᴜsᴇʀ's ᴍᴇssᴀɢᴇ."

user_extract_fail: "<b>ᴜɴᴀʙʟᴇ ᴛᴏ ɢᴇᴛ ᴛʜᴀᴛ ᴜsᴇʀ:</b> <i>{error}</i>"

auth_limit_reached: "ᴛʜɪs ᴄʜᴀᴛ ʜᴀs ʀᴇᴀᴄʜᴇᴅ ᴛʜᴇ ᴍᴀxɪᴍᴜᴍ ᴀᴜᴛʜᴏʀɪᴢᴇᴅ ᴜsᴇʀs ʟɪᴍɪᴛ ({limit}). ᴘʟᴇᴀsᴇ ʀᴇᴍᴏᴠᴇ sᴏᴍᴇᴏɴᴇ ʙᴇꜰᴏʀᴇ ᴀᴅᴅɪɴɢ ᴀ ɴᴇᴡ ᴏɴᴇ."

already_authed: "ᴛʜᴀᴛ ᴜsᴇʀ ɪs ᴀʟʀᴇᴀᴅʏ ᴀᴜᴛʜᴏʀɪᴢᴇᴅ — ɴᴏ ɴᴇᴇᴅ ᴛᴏ ᴀᴅᴅ ᴛʜᴇᴍ ᴀɢᴀɪɴ."

# Add auth
cannot_authorize_user: "ᴛʜɪs ᴜsᴇʀ ᴄᴀɴɴᴏᴛ ʙᴇ ᴀᴜᴛʜᴏʀɪᴢᴇᴅ.\nᴛʜᴇ ʙᴏᴛ ᴏᴡɴᴇʀ, ᴛʜᴇ ʙᴏᴛ ɪᴛsᴇʟꜰ, ᴏʀ ʏᴏᴜʀsᴇʟꜰ ᴅᴏ ɴᴏᴛ ʀᴇǫᴜɪʀᴇ ᴀᴜᴛʜᴏʀɪᴢᴀᴛɪᴏɴ."

addauth_user_is_admin: "ᴛʜɪs ᴜsᴇʀ ɪs ᴀʟʀᴇᴀᴅʏ ᴀ ᴄʜᴀᴛ ᴀᴅᴍɪɴɪsᴛʀᴀᴛᴏʀ. ɴᴏ ᴀᴜᴛʜᴏʀɪᴢᴀᴛɪᴏɴ ɪs ʀᴇǫᴜɪʀᴇᴅ."

addauth_bot_user: "ʏᴏᴜ ᴄᴀɴ’ᴛ ᴀᴅᴅ ᴀ ʙᴏᴛ ᴛᴏ ᴛʜᴇ ᴀᴜᴛʜ ʟɪsᴛ — ᴀᴜᴛʜᴜsᴇʀs ᴍᴜsᴛ ʙᴇ ʜᴜᴍᴀɴ!"

addauth_add_fail: "<b>ꜰᴀɪʟᴇᴅ ᴛᴏ ᴀᴅᴅ ᴀᴜᴛʜᴏʀɪᴢᴇᴅ ᴜsᴇʀ: {error}</b>"

addauth_success_with_count: "ᴀᴅᴅᴇᴅ {user}.\nɴᴏᴡ {count}/{limit} ᴀᴜᴛʜᴏʀɪᴢᴇᴅ ᴜsᴇʀs."

addauth_success: "sᴜᴄᴄᴇssꜰᴜʟʟʏ ᴀᴅᴅᴇᴅ {user} ᴛᴏ ᴛʜᴇ ᴀᴜᴛʜᴏʀɪᴢᴇᴅ ᴜsᴇʀs ʟɪsᴛ."

