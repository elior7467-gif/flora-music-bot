# Assistant Restricted / Banned
assistant_restricted_warning: |
  <b>ᴀssɪsᴛᴀɴᴛ ʀᴇsᴛʀɪᴄᴛᴇᴅ</b>

  ᴛʜᴇ ᴀssɪsᴛᴀɴᴛ {assistant} (ɪᴅ: <code>{id}</code>) ʜᴀs ʙᴇᴇɴ <b>ʙᴀɴɴᴇᴅ</b> ᴏʀ ʀᴇsᴛʀɪᴄᴛᴇᴅ ɪɴ ᴛʜɪs ᴄʜᴀᴛ.
  ɪ ᴄᴀɴɴᴏᴛ ᴘʟᴀʏ ᴍᴜsɪᴄ, ᴍᴀɴᴀɢᴇ ᴛʜᴇ ǫᴜᴇᴜᴇ, ᴏʀ ᴄʟᴇᴀɴ ᴜᴘ ᴛʀᴀᴄᴋs ᴡʜɪʟᴇ ᴛʜɪs ᴄONᴛɪɴᴜᴇs.

  <i>ᴜɴʙᴀɴ ᴛʜᴇ ᴀssɪsᴛᴀɴᴛ ᴛᴏ ʀᴇsᴛᴏʀᴇ ᴀʟʟ ᴍᴜsɪᴄ ꜰᴇᴀᴛᴜʀᴇs </i>

# Common auth messages
auth_no_user: "ᴘʟᴇᴀsᴇ ᴘʀᴏᴠɪᴅᴇ ᴀ ᴜsᴇʀ — ᴜsᴇ:\n{cmd} [ᴜsᴇʀ_ɪᴅ] ᴏʀ ʀᴇᴘʟʏ ᴛᴏ ᴀ ᴜsᴇʀ's ᴍᴇssᴀɢᴇ."

user_extract_fail: "ᴜɴᴀʙʟᴇ ᴛᴏ ɢᴇᴛ ᴛʜᴀᴛ ᴜsᴇʀ: <i>{error}</i>"

auth_limit_reached: "ᴛʜɪs ᴄʜᴀᴛ ʜᴀs ʀᴇᴀᴄʜᴇᴅ ᴛʜᴇ ᴍᴀxɪᴍᴜᴍ ᴀᴜᴛʜᴏʀɪᴢᴇᴅ ᴜsᴇʀs ʟɪᴍɪᴛ ({limit}). ᴘʟᴇᴀsᴇ ʀᴇᴍᴏᴠᴇ sᴏᴍᴇᴏɴᴇ ʙᴇꜰᴏʀᴇ ᴀᴅᴅɪɴɢ ᴀ ɴᴇᴡ ᴏɴᴇ."

