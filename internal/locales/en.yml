addauth_bot_user: "ʏᴏᴜ ᴄᴀɴ’ᴛ ᴀᴅᴅ ᴀ ʙᴏᴛ ᴛᴏ ᴛʜᴇ ᴀᴜᴛʜ ʟɪsᴛ — ᴀᴜᴛʜᴜsᴇʀs ᴍᴜsᴛ ʙᴇ ʜᴜᴍᴀɴ!"

