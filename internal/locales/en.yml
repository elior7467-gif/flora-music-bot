# CPlay (Channel Play)
cplay_id_not_set: "ᴄᴘʟᴀʏ ɪᴅ ɴᴏᴛ sᴇᴛ.\n<b>ᴜsᴇ <code>/ᴄᴘʟᴀʏ --sᴇᴛ &ʟᴛ;ᴄʜᴀᴛ_ɪᴅ&ɢᴛ;</code> ᴛᴏ sᴇᴛ ɪᴛ.</b>"

cplay_usage: "<b><b>ᴜsᴀɢᴇ:</b> <code>/ᴄᴘʟᴀʏ --sᴇᴛ &ʟᴛ;ᴄʜᴀɴɴᴇʟ_ɪᴅ&ɢᴛ;</code></b>"

cplay_invalid_chat_id: "<b>ɪɴᴠᴀʟɪᴅ ᴄʜᴀᴛ ɪᴅ:</b> ᴘʟᴇᴀsᴇ ᴘʀᴏᴠɪᴅᴇ ᴀ ᴠᴀʟɪᴅ ɪɴᴛᴇɢᴇʀ ɪᴅ ꜰᴏʀ ᴛʜᴇ ᴄʜᴀɴɴᴇʟ."

cplay_resolve_peer_fail: "<b>ꜰᴀɪʟᴇᴅ ᴛᴏ ʀᴇsᴏʟᴠᴇ ᴘᴇᴇʀ:</b> ᴄᴏᴜʟᴅ ɴᴏᴛ ꜰᴇᴛᴄʜ ᴄʜᴀɴɴᴇʟ ᴅᴇᴛᴀɪʟs. ᴇɴsᴜʀᴇ ɪ ᴄᴀɴ ᴀᴄᴄᴇss ᴛʜɪs ᴄʜᴀɴɴᴇʟ."

cplay_invalid_target: "<b>ɪɴᴠᴀʟɪᴅ ᴛᴀʀɢᴇᴛ:</b> ᴛʜᴇ ᴘʀᴏᴠɪᴅᴇᴅ ɪᴅ ɪs ɴᴏᴛ ᴀ ᴠᴀʟɪᴅ ᴄʜᴀɴɴᴇʟ."

cplay_channel_not_accessible: "<b>ᴄʜᴀɴɴᴇʟ ɴᴏᴛ ᴀᴄᴄᴇssɪʙʟᴇ:</b> ᴄᴏᴜʟᴅ ɴᴏᴛ ʀᴇᴛʀɪᴇᴠᴇ ᴄʜᴀɴɴᴇʟ ɪɴꜰᴏʀᴍᴀᴛɪᴏɴ. ᴘʟᴇᴀsᴇ ᴇɴsᴜʀᴇ ɪ ᴀᴍ ᴀɴ ᴀᴅᴍɪɴɪsᴛʀᴀᴛᴏʀ ɪɴ ᴛʜᴇ ᴛᴀʀɢᴇᴛ ᴄʜᴀɴɴᴇʟ."

cplay_save_error: "<b>ᴇʀʀᴏʀ:</b> ꜰᴀɪʟᴇᴅ ᴛᴏ sᴀᴠᴇ ᴄᴘʟᴀʏ sᴇᴛᴛɪɴɢs."

cplay_enabled: "<b><b>ᴄʜᴀɴɴᴇʟ ᴘʟᴀʏ ᴇɴᴀʙʟᴇᴅ.</b> ᴀʟʟ <code>/s</code> ᴄᴏᴍᴍᴀɴᴅs ᴡɪʟʟ ɴᴏᴡ ᴡᴏʀᴋ ɪɴ ᴄʜᴀɴɴᴇʟ <code>{channel_id}</code>.</b>"

