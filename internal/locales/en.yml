# CPlay (Channel Play)

cplay_id_not_set: "ᴄᴘʟᴀʏ ɪᴅ ɴᴏᴛ sᴇᴛ.\nᴜsᴇ <code>/ᴄᴘʟᴀʏ --sᴇᴛ &ʟᴛ;ᴄʜᴀᴛ_ɪᴅ&ɢᴛ;</code> ᴛᴏ sᴇᴛ ɪᴛ."

cplay_usage: "<b>ᴜsᴀɢᴇ:</b> <code>/ᴄᴘʟᴀʏ --sᴇᴛ &ʟᴛ;ᴄʜᴀɴɴᴇʟ_ɪᴅ&ɢᴛ;</code>"

