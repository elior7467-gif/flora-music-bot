# Commands help
help_owner: |
  <b><b>ᴏᴡɴᴇʀ ᴄᴏᴍᴍᴀɴᴅs</b>

  <i>ᴇxᴄʟᴜsɪᴠᴇ ᴛᴏᴏʟs ꜰᴏʀ ᴍᴀɴᴀɢɪɴɢ sᴜᴅᴏᴇʀs, ᴇxᴇᴄᴜᴛɪɴɢ sʏsᴛᴇᴍ ᴄᴏᴅᴇ, ᴀɴᴅ ᴘᴇʀꜰᴏʀᴍɪɴɢ ʙᴏᴛ ᴀᴅᴍɪɴɪsᴛʀᴀᴛɪᴏɴ sᴇᴄᴜʀᴇʟʏ.</i>

  <b><b>ᴄᴏᴍᴍᴀɴᴅs:</b>\n  <blockquote>\n  <b>/ᴀ─ᴅᴅ─sᴜ─ᴅᴏ─</b> - ᴀ─ᴅᴅ─ ᴀ─ ɴ─ᴇ─ᴡ─ ᴜ─sᴇ─ʀ ᴛᴏ─ ʙᴏ─ᴛ's sᴜ─ᴅᴏ─ʟɪ─sᴛ\n  <b>/ᴅᴇ─ʟ─sᴜ─ᴅᴏ─</b> - ʀᴇ─ᴍ─ᴏ─ᴠᴇ─ ᴀ─ ᴜ─sᴇ─ʀ ꜰʀᴏ─ᴍ─ ʙᴏ─ᴛ's sᴜ─ᴅᴏ─ʟɪ─sᴛ\n  <b>/ᴇ─ᴠᴀ─ʟ</b> - ᴇ─xᴇ─ᴄᴜ─ᴛᴇ─ ɢᴏ─ ᴄᴏ─ᴅᴇ─ sɴ─ɪ─ᴘᴘᴇ─ᴛs\n  <b>/ᴍ─ᴀ─ɪ─ɴ─ᴛᴇ─ɴ─ᴀ─ɴ─ᴄᴇ─</b> — ᴍ─ᴀ─ɴ─ᴀ─ɢᴇ─ ᴛʜ─ᴇ─ ʙᴏ─ᴛ’s ᴍ─ᴀ─ɪ─ɴ─ᴛᴇ─ɴ─ᴀ─ɴ─ᴄᴇ─ ᴍ─ᴏ─ᴅᴇ─\n  <b>/ʀᴇ─sᴛᴀ─ʀᴛ</b> — ʀᴇ─sᴛᴀ─ʀᴛ ᴛʜ─ᴇ─ ʙᴏ─ᴛ\n  <b>/sʜ─</b> - ʀᴜ─ɴ─ sʜ─ᴇ─ʟʟ ᴄᴏ─ᴍ─ᴍ─ᴀ─ɴ─ᴅs\n  </blockquote></b></b>

help_sudo: |
  <b><b>sᴜᴅᴏᴇʀ ᴄᴏᴍᴍᴀɴᴅs</b>

  <i><b>ᴀᴅᴠᴀɴᴄᴇᴅ ᴛᴏᴏʟs ꜰᴏʀ ᴍᴀɴᴀɢɪɴɢ ʙᴏᴛ ʙᴇʜᴀᴠɪᴏʀ, ᴍᴏɴɪᴛᴏʀɪɴɢ ᴘᴇʀꜰᴏʀᴍᴀɴᴄᴇ, ᴀɴᴅ ᴄᴏɴᴛʀᴏʟʟɪɴɢ ʟᴏɢɢɪɴɢ ᴀɴᴅ ᴀᴜᴛᴏᴍᴀᴛɪᴏn.</b></i>

  <b>ᴄᴏᴍᴍᴀɴᴅs:</b>
  <blockquote>
  <b>/ᴀᴄᴛɪᴠᴇ</b> - sʜᴏᴡs ᴛᴏᴛᴀʟ ᴀᴄᴛɪᴠᴇ ᴄʜᴀᴛs
  <b>/ᴀᴜᴛᴏʟᴇᴀᴠᴇ</b> - ᴛᴏɢɢʟᴇ ᴀᴜᴛᴏᴍᴀᴛɪᴄ ᴄʜᴀᴛ ʟᴇᴀᴠɪɴɢ
  <b>/ʟᴏɢɢᴇʀ</b> - ᴇɴᴀʙʟᴇ ᴏʀ ᴅɪsᴀʙʟᴇ ʟᴏɢɢᴇʀ
  <b>/sᴛᴀᴛs</b> - ᴅɪsᴘʟᴀʏ ᴛʜᴇ ʙᴏᴛ & sʏsᴛᴇᴍ sᴛᴀᴛs
  <b>/ʟᴏɢs</b> - ɢᴇᴛ ᴛʜᴇ sʏsᴛᴇᴍ ʟᴏɢs 
  </blockquote></b>

help_admin: |
  <b><b>ᴀᴅᴍɪɴ ᴄᴏᴍᴍᴀɴᴅs</b>

  <i>ᴍᴜsɪᴄ ᴀɴᴅ ᴘʟᴀʏʙᴀᴄᴋ ᴄᴏɴᴛʀᴏʟ ᴛᴏᴏʟs ꜰᴏʀ ᴀᴅᴍɪɴs ᴛᴏ ʜᴀɴᴅʟᴇ ᴘʟᴀʏʙᴀᴄᴋ ᴇᴀsɪʟʏ.</i>

  <b><b>ᴄᴏᴍᴍᴀɴᴅs:</b>\n  <blockquote>\n  <b>/ᴘʟᴀ─ʏᴍ─ᴏ─ᴅᴇ─</b> - ᴄᴏ─ɴ─ᴛʀᴏ─ʟ ᴡʜ─ᴏ─ ᴄᴀ─ɴ─ ᴜ─sᴇ─ /ᴘʟ─ᴀ─ʏ\n  <b>/<b>ᴄᴍ─ᴅᴅᴇ─ʟᴇ─ᴛᴇ─</b> - ᴛᴏ─ɢɢʟᴇ─ ᴀ─ᴜᴛᴏ─ᴍ─ᴀ─ᴛɪ─ᴄ ᴅᴇ─ʟ─ᴇ─ᴛɪ─ᴏ─ɴ─ ᴏ─ꜰ ʙᴏ─ᴛ ᴄᴏ─ᴍ─ᴍ─ᴀ─ɴ─ᴅs</b>\n  <b>/sᴘᴇ─ᴇ─ᴅ</b> - ᴄʜ─ᴀ─ɴ─ɢᴇ─ ᴘʟ─ᴀ─ʏʙ─ᴀ─ᴄᴋ sᴘᴇ─ᴇ─ᴅ\n  <b>/sᴋɪ─ᴘ</b> - sᴋɪ─ᴘ ᴛʜ─ᴇ─ ᴄᴜ─ʀʀᴇ─ɴ─ᴛ sᴏ─ɴ─ɢ\n  <b>/ᴘᴀ─ᴜs─ᴇ─</b> - ᴘ─ᴀ─ᴜs─ᴇ─ ᴛʜ─ᴇ─ ᴄᴜ─ʀʀᴇ─ɴ─ᴛ ᴘʟ─ᴀ─ʏʙ─ᴀ─ᴄᴋ\n  <b>/ʀᴇ─sᴜ─ᴍ─ᴇ─</b> - ʀ─ᴇ─sᴜ─ᴍ─ᴇ─ ᴘᴀ─ᴜs─ᴇ─ᴅ ᴘʟ─ᴀ─ʏʙ─ᴀ─ᴄᴋ\n  <b>/<b>ʀ─ᴇ─ᴘʟ─ᴀ─ʏ</b> - ʀᴇ─ᴘʟ─ᴀ─ʏ ᴛʜ─ᴇ─ ᴄᴜ─ʀʀᴇ─ɴ─ᴛ sᴏ─ɴ─ɢ</b>\n  <b>/ᴍ─ᴜ─ᴛᴇ─</b> - ᴍ─ᴜ─ᴛᴇ─ ᴘʟ─ᴀ─ʏʙ─ᴀ─ᴄᴋ\n  <b>/ᴜ─ɴ─ᴍ─ᴜ─ᴛᴇ─</b> - ᴜ─ɴ─ᴍ─ᴜ─ᴛᴇ─ ᴘʟ─ᴀ─ʏʙ─ᴀ─ᴄᴋ\n  <b>/sᴇ─ᴇ─ᴋ</b> - sᴇ─ᴇ─ᴋ ꜰᴏ─ʀᴡ─ᴀ─ʀᴅ ʙʏ ᴀ─ ꜰᴇ─ᴡ sᴇ─ᴄᴏ─ɴ─ᴅs\n  <b>/sᴇ─ᴇ─ᴋʙ─ᴀ─ᴄᴋ</b> - sᴇ─ᴇ─ᴋ ʙᴀ─ᴄᴋᴡ─ᴀ─ʀᴅ ʙʏ ᴀ─ ꜰᴇ─ᴡ sᴇ─ᴄᴏ─ɴ─ᴅs\n  <b>/<b>ᴊᴜ─ᴍ─ᴘ</b> - ᴊᴜ─ᴍ─ᴘ ᴛᴏ─ ᴀ─ ɢɪ─ᴠᴇ─ɴ─ ᴛɪ─ᴍ─ᴇ─ ɪ─ɴ─ ᴛʀ─ᴀ─ᴄᴋ</b>\n  <b>/ᴍ─ᴏ─ᴠᴇ─</b> - ᴍ─ᴏ─ᴠᴇ─ ᴀ─ ǫᴜ─ᴇ─ᴜ─ᴇ─ᴅ ᴛʀ─ᴀ─ᴄᴋ ᴛᴏ─ ᴀ─ɴ─ᴏ─ᴛʜ─ᴇ─ʀ ᴘᴏ─sɪ─ᴛɪ─ᴏ─ɴ─\n  <b>/ᴄʟᴇ─ᴀ─ʀ</b> - <b>ᴄʟ─ᴇ─ᴀ─ʀ ᴀ─ʟʟ sᴏ─ɴ─ɢs ꜰʀᴏ─ᴍ─ ǫᴜ─ᴇ─ᴜ─ᴇ─</b>\n  <b>/ʀᴇ─ᴍ─ᴏ─ᴠᴇ─</b> - ʀᴇ─ᴍ─ᴏ─ᴠᴇ─ ᴀ─ sᴘᴇ─ᴄɪ─ꜰɪ─ᴄ ᴛʀ─ᴀ─ᴄᴋ ꜰʀᴏ─ᴍ─ ǫᴜ─ᴇ─ᴜ─ᴇ─\n  <b>/sʜ─ᴜ─ꜰꜰ─ʟᴇ─</b> - sʜ─ᴜ─ꜰꜰ─ʟᴇ─ ᴀ─ʟʟ ǫᴜ─ᴇ─ᴜ─ᴇ─ᴅ ᴛʀ─ᴀ─ᴄᴋs\n  <b>/ʟᴏ─ᴏ─ᴘ</b> - ᴇ─ɴ─ᴀ─ʙʟᴇ─ ᴏ─r─ <b>ᴅɪ─sᴀ─ʙʟᴇ─ ʟᴏ─ᴏ─ᴘɪ─ɴ─ɢ</b>\n  <b>/sᴛᴏ─ᴘ</b> - sᴛᴏ─ᴘ <b>ᴘʟ─ᴀ─ʏʙ─ᴀ─ᴄᴋ ᴀ─ɴ─ᴅ ʟᴇ─ᴀ─ᴠᴇ─ ᴠᴄ</b>\n  <b>/ɴ─ᴏ─ᴛʜ─ᴜ─ᴍ─ʙ</b> - ᴇ─ɴ─ᴀ─ʙʟᴇ─ ᴏ─ʀ ᴅɪ─sᴀ─ʙʟᴇ─ ᴀ─ʀᴛᴡ─ᴏ─ʀᴋ/ᴛʜ─ᴜ─ᴍ─ʙɴ─ᴀ─ɪ─ʟ ɪ─ɴ─ ᴘʟ─ᴀ─ʏʙ─ᴀ─ᴄᴋ ᴍ─ᴇ─ssᴀ─ɢᴇ─s\n  </b></blockquote></b></b>

help_public: |
  <b><b>ᴘᴜʙʟɪᴄ ᴄᴏᴍᴍᴀɴᴅs</b>

  <i>ᴍᴜsɪᴄ ᴀɴ─ᴅ ᴘʟᴀ─ʏʙ─ᴀ─ᴄᴋ ᴄᴏ─ɴ─ᴛʀᴏ─ʟ ᴛᴏ─ᴏ─ʟs ꜰᴏ─ʀ ᴀ─ᴅᴍ─ɪ─ɴ─s ᴛᴏ─ ʜᴀ─ɴ─ᴅʟᴇ─ ᴘʟ─ᴀ─ʏʙ─ᴀ─ᴄᴋ ᴇ─ᴀ─sɪ─ʟʏ.</i>

  <b><b>ᴄᴏᴍᴍᴀɴᴅs:</b>\n  <blockquote>\n  <b>/ᴘʟ─ᴀ─ʏ</b> - ᴘʟ─ᴀ─ʏ ᴀ─ sᴏ─ɴ─ɢ\n  <b>/ǫᴜ─ᴇ─ᴜ─ᴇ─</b> - <b>ᴠɪ─ᴇ─ᴡ ᴀ─ʟʟ ᴛʀ─ᴀ─ᴄᴋs ᴄᴜ─ʀʀᴇ─ɴ─ᴛʟʏ ǫᴜ─ᴇ─ᴜ─ᴇ─ᴅ</b>\n  <b>/ᴘɪ─ɴ─ɢ</b> - ᴄʜ─ᴇ─ᴄᴋ <b>ʙᴏ─ᴛ’s ɴ─ᴇ─ᴛᴡ─ᴏ─ʀᴋ ʟᴀ─ᴛᴇ─ɴ─ᴄʏ</b>\n  <b>/sᴛ─ᴀ─ʀᴛ</b> - sᴛ─ᴀ─ʀᴛ ᴛʜ─ᴇ─ ʙᴏ─ᴛ\n  <b>/ʜᴇ─ʟᴘ</b> - sʜ─ᴏ─ᴡ ʜᴇ─ʟᴘ ᴍ─ᴇ─ɴ─ᴜ─\n  <b>/<b>ʙᴜ─ɢ</b> - ʀᴇ─ᴘᴏ─ʀᴛ ᴀ─ɴ─ ɪ─ssᴜ─ᴇ─ ᴏ─ʀ ᴘʀᴏ─ʙʟᴇ─ᴍ─</b>\n  <b>/ᴘᴏ─sɪ─ᴛɪ─ᴏ─ɴ─</b> - sʜ─ᴏ─ᴡ ᴄᴜ─ʀʀᴇ─ɴ─ᴛ ᴛʀ─ᴀ─ᴄᴋ’s ᴛɪ─ᴍ─ᴇ─sᴛᴀ─ᴍ─ᴘ\n  <b>/ʀ─ᴇ─ʟᴏ─ᴀ─ᴅ</b> - ʀᴇ─ʟᴏ─ᴀ─ᴅ ᴀ─ᴅᴍ─ɪ─ɴ─ ᴏ─ʀ ᴄᴀ─ᴄʜ─ᴇ─ ᴅᴀ─ᴛᴀ─\n  <b>/ᴊsᴏ─ɴ─</b> - sʜ─ᴏ─ᴡ ᴍ─ᴇ─ssᴀ─ɢᴇ─ ᴊsᴏ─ɴ─ sᴛʀᴜ─ᴄᴛᴜ─ʀᴇ─\n  <b>/sᴜ─ᴅᴏ─ʟɪ─sᴛ</b> - <b>ᴠɪ─ᴇ─ᴡ sᴜ─ᴅᴏ─ ᴜ─sᴇ─ʀ ʟɪ─sᴛ</b>\n  </blockquote></b></b>
  
