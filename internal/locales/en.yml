settings_info_adminmode: |
  🛡️ ᴡʜᴀᴛ ɪs ᴛʜɪs?

  ᴄᴏɴᴛʀᴏʟs ᴡʜᴏ ᴄᴀɴ ᴜsᴇ ᴀᴅᴍɪɴ ᴄᴏᴍᴍᴀɴᴅs ᴏꜰ ᴛʜᴇ ʙᴏᴛ (sᴋɪᴘ, ᴘᴀᴜsᴇ, ᴇᴛᴄ.).
settings_info_playmode: |
  🎵 ᴡʜᴀᴛ ɪs ᴛʜɪs?

  ᴄᴏɴᴛʀᴏʟ ᴡʜᴏ ᴄᴀɴ ᴜsᴇ ᴛʜᴇ /ᴘʟᴀʏ ᴄᴏᴍᴍᴀɴᴅ. ɪꜰ ᴇɴᴀʙʟᴇᴅ, ᴏɴʟʏ ᴀᴅᴍɪɴɪsᴛʀᴀᴛᴏʀs ᴀɴᴅ ᴀᴜᴛʜᴏʀɪᴢᴇᴅ ᴜsᴇʀs ᴄᴀɴ sᴛᴀʀᴛ ᴘʟᴀʏʙᴀᴄᴋ.
settings_info_cmddelete: |
  🗑️ ᴡʜᴀᴛ ɪs ᴛʜɪs?

  ᴡʜᴇɴ ᴇɴᴀʙʟᴇᴅ, ᴛʜᴇ ʙᴏᴛ ᴡɪʟʟ ᴀᴜᴛᴏᴍᴀᴛɪᴄᴀʟʟʏ ᴅᴇʟᴇᴛᴇ ᴄᴏᴍᴍᴀɴᴅ ᴍᴇssᴀɢᴇs ᴀꜰᴛᴇʀ ᴘʀᴏᴄᴇssɪɴɢ ᴛʜᴇᴍ ᴛᴏ ᴋᴇᴇᴘ ᴛʜᴇ ᴄʜᴀᴛ ᴄʟᴇᴀɴ.
settings_info_cleanmode: |
  🧹 ᴡʜᴀᴛ ɪs ᴛʜɪs?

  ᴀᴜᴛᴏᴍᴀᴛɪᴄᴀʟʟʏ ʀᴇᴍᴏᴠᴇs ᴄᴏᴍᴍᴀɴᴅ ᴀɴᴅ ʙᴏᴛ sᴇʀᴠɪᴄᴇ ᴍᴇssᴀɢᴇs ᴀꜰᴛᴇʀ ᴀ sʜᴏʀᴛ ᴅᴇʟᴀʏ.
  ᴘʟᴀʏɪɴɢ sᴛᴀᴛᴜs ᴍᴇssᴀɢᴇs ᴀʀᴇ ᴋᴇᴘᴛ ᴜɴᴛɪʟ ᴛʜᴇʏ ɴᴀᴛᴜʀᴀʟʟʏ ᴇxᴘɪʀᴇ.
settings_info_cleanduration: |
  ⏱️ ᴄʏᴄʟᴇs ᴛʜᴇ ᴀᴜᴛᴏ-ᴅᴇʟᴇᴛᴇ ᴅᴇʟᴀʏ: 15ᴍ → 30ᴍ → 60ᴍ → 5ᴍ.
settings_info_nothumb: |
