  ᴛᴏɢɢʟᴇ ᴡʜᴇᴛʜᴇʀ ᴛᴏ sʜᴏᴡ ᴛʀᴀᴄᴋ ᴀʀᴛᴡᴏʀᴋ/ᴛʜᴜᴍʙɴᴀɪʟs ɪɴ ᴘʟᴀʏʙᴀᴄᴋ ᴍᴇssᴀɢᴇs.
settings_info_lang: |
